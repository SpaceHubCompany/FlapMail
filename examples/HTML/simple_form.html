<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Form - FlapMail Example</title>

  <style>
    body { font-family: Arial, sans-serif; background:#07111f; color:#eaf2ff; margin:0; padding:32px; }
    .card { max-width:820px; margin:0 auto; background:#0f1b31; border:1px solid #1d3a6d; border-radius:18px; padding:28px; box-shadow:0 18px 45px rgba(0,0,0,.35); }
    h1 { margin-top:0; color:#7fc1ff; }
    p { color:#bfd2ef; }
    label { display:block; margin-top:14px; font-weight:700; }
    input, select, textarea, button { width:100%; box-sizing:border-box; border-radius:12px; border:1px solid #2f4f87; background:#091427; color:#fff; padding:14px; margin-top:8px; }
    textarea { min-height:130px; resize:vertical; }
    button { background:linear-gradient(135deg,#0f4fff,#1a8dff); border:none; cursor:pointer; font-weight:700; }
    .note { font-size:13px; color:#9db6dd; }
    .status { margin-top:16px; padding:12px; border-radius:12px; display:none; }
    .ok { background:#11351f; color:#b8ffcb; display:block; }
    .err { background:#3f1515; color:#ffc3c3; display:block; }
  </style>

</head>
<body>
  <div class="card">
    <h1>Simple Form</h1>
    <p>A minimal contact form example using FlapMail</p>
    <form id="flapmail-form">

      <label for="name">Full Name</label>
      <input id="name" name="name" required />
      <label for="email">Email</label>
      <input id="email" name="email" type="email" required />
      <label for="message">Message</label>
      <textarea id="message" name="message" required></textarea>

      <button type="submit">Send</button>
      <p class="note">Update the token constant before using this example.</p>
    </form>
    <div id="status" class="status"></div>
  </div>
  <script>
    const FLAPMAIL_ENDPOINT = 'https://app.flapmail.net/api/submit.php';
    // Gere uma chave Token e coloque aqui
    const FLAPMAIL_TOKEN = 'ms_replace_with_your_token';
    function isValidEmail(email) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email); }
    function setStatus(message, ok) {
      const box = document.getElementById('status');
      box.className = 'status ' + (ok ? 'ok' : 'err');
      box.textContent = message;
    }
    document.getElementById('flapmail-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const formData = new FormData(event.target);
      const email = (formData.get('email') || '').toString().trim();
      if (!isValidEmail(email)) { setStatus('Please enter a valid email address.', false); return; }
      formData.append('token', FLAPMAIL_TOKEN);
      // format can be 'html' or 'text'
      formData.append('format', 'html');

      try {
        const response = await fetch(FLAPMAIL_ENDPOINT, { method: 'POST', body: formData });
        const data = await response.json();
        if (response.ok && data.ok) { setStatus('Message sent successfully.', true); event.target.reset(); }
        else { setStatus(data.error || 'Unable to send the message.', false); }
      } catch (error) {
        setStatus('Network error while sending the message.', false);
      }
    });
  </script>
</body>
</html>
