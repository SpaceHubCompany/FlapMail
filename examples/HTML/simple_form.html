<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Form - FlapMail Example</title>
  <style>
    body { font-family: Arial, sans-serif; background:#0b1220; color:#eaf2ff; margin:0; padding:32px; }
    .card { max-width:760px; margin:0 auto; background:#111a2e; border:1px solid #1f3158; border-radius:18px; padding:28px; box-shadow:0 18px 45px rgba(0,0,0,.35); }
    h1 { margin-top:0; color:#8dc2ff; }
    p { color:#b8c7e3; }
    label { display:block; margin-top:16px; font-weight:700; }
    input, select, textarea, button { width:100%; box-sizing:border-box; border-radius:12px; border:1px solid #2f487f; background:#0a1325; color:#fff; padding:14px; margin-top:8px; }
    textarea { min-height:140px; resize:vertical; }
    button { background:linear-gradient(135deg,#0f4fff,#198cff); border:none; cursor:pointer; font-weight:700; }
    .note { font-size:13px; color:#92a8cf; }
    .status { margin-top:16px; padding:12px; border-radius:12px; display:none; }
    .ok { background:#11351f; color:#b8ffcb; display:block; }
    .err { background:#3f1515; color:#ffc3c3; display:block; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Simple Form</h1>
    <p>A minimal contact form example using FlapMail.</p>
    <form id="flapmail-form">

<label for="name">Full Name</label>
<input id="name" name="name" required />
<label for="email">Email</label>
<input id="email" name="email" type="email" required />
<label for="message">Message</label>
<textarea id="message" name="message" required></textarea>

      <button type="submit">Send</button>
      <p class="note">This example sends the payload to FlapMail using JavaScript fetch.</p>
    </form>
    <div id="status" class="status"></div>
  </div>

  <script>
    const FLAPMAIL_ENDPOINT = 'https://app.flapmail.net/api/submit.php';
    // Gere uma chave Token e coloque aqui
    const FLAPMAIL_TOKEN = 'ms_replace_with_your_token';

    const form = document.getElementById('flapmail-form');
    const statusBox = document.getElementById('status');

    function isValidEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function setStatus(message, ok) {
      statusBox.className = 'status ' + (ok ? 'ok' : 'err');
      statusBox.textContent = message;
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const formData = new FormData(form);
      const email = (formData.get('email') || '').toString().trim();

      if (!isValidEmail(email)) {
        setStatus('Please enter a valid email address.', false);
        return;
      }

      formData.append('token', FLAPMAIL_TOKEN);
      formData.append('format', 'html');

      try {
        const response = await fetch(FLAPMAIL_ENDPOINT, { method: 'POST', body: formData });
        const data = await response.json();
        if (response.ok && data.ok) {
          setStatus('Message sent successfully.', true);
          form.reset();
        } else {
          setStatus(data.error || 'Unable to send the message.', false);
        }
      } catch (error) {
        setStatus('Network error while sending the message.', false);
      }
    });
  </script>
</body>
</html>
